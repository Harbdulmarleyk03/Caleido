name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    # NOTE: testing.py uses SQLite/LocMemCache/memory broker exclusively.
    # These services are not currently consumed by pytest — kept for future
    # integration testing against real Postgres/Redis (e.g. docker-compose verification).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: caleido
          POSTGRES_USER: caleido_user
          POSTGRES_PASSWORD: Caleido@2003
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13.3"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements/base.txt
          pip install -r requirements/development.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Check formatting with black
        run: black --check .

      - name: Run tests with coverage
        env:
          DJANGO_SETTINGS_MODULE: config.settings.testing
        run: |
          pytest --cov=apps --cov=common --cov-report=term-missing --cov-fail-under=80