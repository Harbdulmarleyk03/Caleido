components:
  schemas:
    AnalyticsResponse:
      type: object
      properties:
        total_bookings:
          type: integer
        cancelled_bookings:
          type: integer
        avg_duration_minutes:
          type: number
          format: double
        period:
          type: string
      required:
      - period
      - total_bookings
    AssignmentRuleEnum:
      enum:
      - direct
      - round_robin
      - collective
      type: string
      description: |-
        * `direct` - Direct
        * `round_robin` - Round Robin
        * `collective` - Collective
    AvailabilityRule:
      type: object
      properties:
        event_type:
          type: string
          format: uuid
          readOnly: true
        day_of_week:
          type: integer
