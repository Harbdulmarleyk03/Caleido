          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ResendVerificationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ResendVerificationRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResendVerification'
          description: ''
  /api/v1/bookings/:
    get:
      operationId: bookings_list
      parameters:
      - name: cursor
        required: false
        in: query
        description: The pagination cursor value.
        schema:
          type: string
      - in: query
        name: event_type_id
        schema:
          type: string
          format: uuid
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: start_time_after
        schema:
          type: string
          format: date-time
      - in: query
        name: start_time_before
        schema:
          type: string
          format: date-time
      - in: query
        name: status
        schema:
          type: string
      tags:
      - bookings
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBookingList'
          description: ''
    post:
      operationId: bookings_create
      tags:
      - bookings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBookingRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CreateBookingRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateBookingRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateBooking'
          description: ''
  /api/v1/bookings/{booking_id}/ical/:
    get:
      operationId: bookings_ical_retrieve
      description: Exports a single booking as a downloadable .ics calendar file.
      parameters:
      - in: path
        name: booking_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - bookings
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            text/calendar:
              schema:
                type: string
                format: binary
          description: RFC 5545 .ics file for this booking, served as a download.
        '403':
          description: Requester is not the owner of this booking's event type.
        '404':
          description: Booking not found.
  /api/v1/bookings/{id}/:
    get:
      operationId: bookings_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this booking.
        required: true
      tags:
      - bookings
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
          description: ''
  /api/v1/bookings/{id}/cancel/:
    patch:
      operationId: bookings_cancel_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this booking.
        required: true
      tags:
      - bookings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedBookingRequest'
          application/x-www-form-urlencoded:
            schema:
