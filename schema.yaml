openapi: 3.0.3
info:
  title: Caleido API
  version: 1.0.0
  description: Production-grade scheduling platform API — JWT + Google OAuth2 auth,
    race-condition-safe bookings, Redis-cached availability, async reminders via Celery,
    RFC 5545 iCal export.
paths:
  /api/v1/analytics/analytics/:
    get:
      operationId: analytics_analytics_retrieve
      parameters:
      - in: query
        name: period
        schema:
          type: string
          enum:
          - 30d
          - 7d
          - 90d
          - all
          default: all
        description: Aggregation window for the analytics query.
      tags:
      - analytics
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsResponse'
          description: Aggregated booking analytics for the authenticated owner
        '400':
          description: Invalid period value
  /api/v1/auth/google/:
    get:
      operationId: auth_google_retrieve
      tags:
      - auth
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: Access to Google's OAuth consent screen
  /api/v1/auth/google/callback/:
    get:
      operationId: auth_google_callback_retrieve
      tags:
      - auth
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: JWT pair on success
  /api/v1/auth/login/:
    post:
      operationId: auth_login_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Login'
          description: ''
  /api/v1/auth/logout/:
    post:
      operationId: auth_logout_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh:
                  type: string
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/auth/logout-all/:
    post:
      operationId: auth_logout_all_create
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/auth/password-reset/:
    post:
      operationId: auth_password_reset_create
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
          application/x-www-form-urlencoded:
            schema:
